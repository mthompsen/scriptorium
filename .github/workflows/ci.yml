# CI for M0: lint + unit tests per service.
# The full DevSecOps pipeline (SAST, scans, SBOM, signing) lands in M5 (DESIGN.md Section 14.1).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: ${{ matrix.dir }} (node)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [services/bff, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Consumer tests regenerate the pact; a dirty diff means the committed
      # contract is stale (ADR-0006).
      - name: pact drift check
        if: matrix.dir == 'services/bff'
        run: git diff --exit-code ../../packages/contracts/pacts

  python:
    name: ${{ matrix.dir }} (python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [services/ingestion, services/agent, packages/llm]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -e ../../packages/llm
        if: matrix.dir != 'packages/llm'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  java:
    name: services/retrieval (java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/retrieval
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.14"
      - run: gradle --no-daemon test
