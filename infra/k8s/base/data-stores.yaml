# Backing stores as StatefulSets with per-pod PVCs. In cloud mode (M6) the
# relational + search tiers move to managed services via Terraform; these
# in-cluster stores keep the K8s deployment self-contained for review.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: postgres } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 999, fsGroup: 999 }
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: scriptorium }
            - { name: POSTGRES_DB, value: scriptorium }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: scriptorium-secrets, key: POSTGRES_PASSWORD } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          readinessProbe:
            exec: { command: [pg_isready, -U, scriptorium] }
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: postgres }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: postgres }
  ports: [{ port: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: mongodb } }
  template:
    metadata: { labels: { app.kubernetes.io/name: mongodb } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 999, fsGroup: 999 }
      containers:
        - name: mongodb
          image: mongo:7
          ports: [{ containerPort: 27017 }]
          readinessProbe:
            exec: { command: [mongosh, --quiet, --eval, "db.adminCommand('ping').ok"] }
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: data, mountPath: /data/db }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: mongodb }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: mongodb }
  ports: [{ port: 27017 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: redis } }
  template:
    metadata: { labels: { app.kubernetes.io/name: redis } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 999, fsGroup: 999 }
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: [redis-cli, ping] }
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
---
apiVersion: v1
kind: Service
metadata: { name: redis }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: redis }
  ports: [{ port: 6379 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: neo4j } }
  template:
    metadata: { labels: { app.kubernetes.io/name: neo4j } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 7474, fsGroup: 7474 }
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports: [{ containerPort: 7687 }, { containerPort: 7474 }]
          env:
            - name: NEO4J_AUTH
              valueFrom: { secretKeyRef: { name: scriptorium-secrets, key: NEO4J_PASSWORD } }
          readinessProbe:
            tcpSocket: { port: 7687 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: neo4j }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: neo4j }
  ports: [{ name: bolt, port: 7687 }, { name: http, port: 7474 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
spec:
  serviceName: opensearch
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: opensearch } }
  template:
    metadata: { labels: { app.kubernetes.io/name: opensearch } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.1
          ports: [{ containerPort: 9200 }]
          env:
            - { name: discovery.type, value: single-node }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG, value: "true" }
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "1", memory: 2Gi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: data, mountPath: /usr/share/opensearch/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 4Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: opensearch }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: opensearch }
  ports: [{ port: 9200 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
spec:
  serviceName: ollama
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: ollama } }
  template:
    metadata: { labels: { app.kubernetes.io/name: ollama } }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports: [{ containerPort: 11434 }]
          readinessProbe:
            exec: { command: [ollama, list] }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 500m, memory: 2Gi }
            limits: { cpu: "2", memory: 6Gi }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: [ALL] } }
          volumeMounts: [{ name: data, mountPath: /root/.ollama }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 8Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: ollama }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: ollama }
  ports: [{ port: 11434 }]
