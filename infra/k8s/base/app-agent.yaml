apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  labels: { app.kubernetes.io/name: agent, app.kubernetes.io/component: reason-path }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: agent }
  template:
    metadata:
      labels: { app.kubernetes.io/name: agent }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: agent
          image: ghcr.io/mthompsen/scriptorium-agent:latest
          ports: [{ containerPort: 8002 }]
          envFrom:
            - configMapRef: { name: scriptorium-config }
          readinessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: home, mountPath: /home/appuser }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: home, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: agent
spec:
  selector: { app.kubernetes.io/name: agent }
  ports: [{ port: 8002, targetPort: 8002 }]
