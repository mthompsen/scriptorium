apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  labels: { app.kubernetes.io/name: bff, app.kubernetes.io/component: edge }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: bff }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bff }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: bff
          image: ghcr.io/mthompsen/scriptorium/bff:latest
          ports: [{ containerPort: 3001 }]
          envFrom:
            - configMapRef: { name: scriptorium-config }
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: scriptorium-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: bff
spec:
  selector: { app.kubernetes.io/name: bff }
  ports: [{ port: 3001, targetPort: 3001 }]
