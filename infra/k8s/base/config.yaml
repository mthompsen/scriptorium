# Non-secret service config. Secrets (JWT_SECRET, DB passwords) come from a
# real secret manager in deployed mode (ARCHITECTURE.md Section 11); the committed
# Secret here holds dev-only placeholders so the base builds standalone.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scriptorium-config
data:
  DATABASE_URL: postgresql://scriptorium:scriptorium-dev@postgres:5432/scriptorium
  MONGO_URL: mongodb://mongodb:27017
  OPENSEARCH_URL: http://opensearch:9200
  OLLAMA_URL: http://ollama:11434
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  RETRIEVAL_URL: http://retrieval:8080
  INGESTION_URL: http://ingestion:8001
  AGENT_URL: http://agent:8002
  FRONTEND_ORIGIN: http://frontend:3000
  EMBED_MODEL: nomic-embed-text
  CHAT_MODEL: llama3.2:3b
---
apiVersion: v1
kind: Secret
metadata:
  name: scriptorium-secrets
type: Opaque
stringData:
  # Dev-only placeholders — overlays for staging/prod must replace these
  # via a real secret manager (External Secrets / sealed-secrets).
  JWT_SECRET: dev-only-secret-change-me
  POSTGRES_PASSWORD: scriptorium-dev
  NEO4J_PASSWORD: scriptorium-dev
