# Default-deny ingress for the namespace, then scoped allows following the
# Section 4 topology: only the BFF is reachable from outside; internal
# services accept traffic only from their declared callers (Section 12).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-bff-ingress
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: bff } }
  policyTypes: [Ingress]
  ingress:
    - {} # edge API: reachable from the ingress controller / frontend
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: frontend } }
  policyTypes: [Ingress]
  ingress:
    - {}
---
# Internal services accept traffic only from other Scriptorium pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-services
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [ingestion, agent, retrieval]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { app.kubernetes.io/part-of: scriptorium }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-datastore-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [postgres, mongodb, redis, opensearch, neo4j, ollama]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { app.kubernetes.io/part-of: scriptorium }
