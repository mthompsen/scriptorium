apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval
  labels: { app.kubernetes.io/name: retrieval, app.kubernetes.io/component: read-path }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: retrieval }
  template:
    metadata:
      labels: { app.kubernetes.io/name: retrieval }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: retrieval
          image: ghcr.io/mthompsen/scriptorium-retrieval:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: scriptorium-config }
          env:
            - name: NEO4J_PASSWORD
              valueFrom: { secretKeyRef: { name: scriptorium-secrets, key: NEO4J_PASSWORD } }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: retrieval
spec:
  selector: { app.kubernetes.io/name: retrieval }
  ports: [{ port: 8080, targetPort: 8080 }]
