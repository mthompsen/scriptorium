# Staging overlay: 2 replicas on stateless services, own namespace.
# Image tags are bumped here by the GitOps CI job on merges to main.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scriptorium-staging

resources:
- ../../base

patches:
- patch: |
    - { op: replace, path: /metadata/name, value: scriptorium-staging }
  target:
    kind: Namespace
    name: scriptorium

replicas:
- count: 2
  name: bff
- count: 2
  name: frontend
- count: 2
  name: retrieval

images:
- name: ghcr.io/mthompsen/scriptorium/agent
  newTag: 38375d1d165a58837d924169810a8f73389fc4a5
- name: ghcr.io/mthompsen/scriptorium/bff
  newTag: 38375d1d165a58837d924169810a8f73389fc4a5
- name: ghcr.io/mthompsen/scriptorium/frontend
  newTag: 38375d1d165a58837d924169810a8f73389fc4a5
- name: ghcr.io/mthompsen/scriptorium/ingestion
  newTag: 38375d1d165a58837d924169810a8f73389fc4a5
- name: ghcr.io/mthompsen/scriptorium/retrieval
  newTag: 38375d1d165a58837d924169810a8f73389fc4a5
