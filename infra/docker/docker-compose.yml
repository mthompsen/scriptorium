# Scriptorium local stack (laptop mode, DESIGN.md Section 14.2).
# Run from the repo root:  docker compose -f infra/docker/docker-compose.yml up -d --build
# All credentials below are dev-only defaults; override via .env (see .env.example).

name: scriptorium

services:
  # ── application services ──────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 only,
      # while Node binds IPv4 0.0.0.0
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.bff
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://scriptorium:${POSTGRES_PASSWORD:-scriptorium-dev}@postgres:5432/scriptorium
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      INGESTION_URL: http://ingestion:8001
      AGENT_URL: http://agent:8002
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      ingestion:
        condition: service_healthy
      agent:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: same busybox/IPv6 pitfall as the frontend
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot schema owner: Alembic from the ingestion image (ADR-0002).
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestion
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://scriptorium:${POSTGRES_PASSWORD:-scriptorium-dev}@postgres:5432/scriptorium
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  ingestion:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestion
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://scriptorium:${POSTGRES_PASSWORD:-scriptorium-dev}@postgres:5432/scriptorium
      MONGO_URL: mongodb://mongodb:27017
      OPENSEARCH_URL: http://opensearch:9200
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:3b}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-scriptorium-dev}
      GRAPH_EXTRACTION: ${GRAPH_EXTRACTION:-on}
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.agent
    ports:
      - "8002:8002"
    environment:
      RETRIEVAL_URL: http://retrieval:8080
      OLLAMA_URL: http://ollama:11434
      # LLM_PROVIDER=anthropic + CHAT_MODEL=claude-... upgrades generation;
      # local 3B via Ollama remains the keyless default (see .env.example).
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      CHAT_MODEL: ${CHAT_MODEL:-llama3.2:3b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JUDGE_LLM_PROVIDER: ${JUDGE_LLM_PROVIDER:-}
      JUDGE_CHAT_MODEL: ${JUDGE_CHAT_MODEL:-}
      DATABASE_URL: postgresql://scriptorium:${POSTGRES_PASSWORD:-scriptorium-dev}@postgres:5432/scriptorium
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-6}
      AGENT_TIMEOUT_S: ${AGENT_TIMEOUT_S:-240}
      PII_FILTER: ${PII_FILTER:-basic}
    depends_on:
      retrieval:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  retrieval:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.retrieval
    ports:
      - "8080:8080"
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-scriptorium-dev}
    depends_on:
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── data stores ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scriptorium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scriptorium-dev}
      POSTGRES_DB: scriptorium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scriptorium"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-scriptorium-dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── local LLM (laptop mode, no cloud account needed) ─────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # One-shot model puller: first run downloads ~2.3 GB into the ollama
  # volume; later runs are instant (ADR-0004, runbook).
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-c"]
    command:
      - ollama pull ${EMBED_MODEL:-nomic-embed-text} && ollama pull ${CHAT_MODEL:-llama3.2:3b}
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
  mongodata:
  osdata:
  neo4jdata:
  ollamadata:
