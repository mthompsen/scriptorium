spring.application.name=retrieval
server.port=8080

scriptorium.opensearch.url=${OPENSEARCH_URL:http://localhost:9200}
scriptorium.ollama.url=${OLLAMA_URL:http://localhost:11434}
scriptorium.embed-model=${EMBED_MODEL:nomic-embed-text}
scriptorium.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
scriptorium.neo4j.user=${NEO4J_USER:neo4j}
scriptorium.neo4j.password=${NEO4J_PASSWORD:scriptorium-dev}

# Legacy admin console (RP5): server-rendered JSP under /legacy/admin/**
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
scriptorium.legacy-admin.user=${LEGACY_ADMIN_USER:admin}
scriptorium.legacy-admin.password=${LEGACY_ADMIN_PASSWORD:scriptorium-dev}
